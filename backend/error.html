<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام متوقف حالياً</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            border-top: 5px solid #3b82f6;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        h1 {
            color: #3b82f6;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        .btn:hover {
            background-color: #2563eb;
            box-shadow: 0 5px 15px rgba(59,130,246,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚙️</div>
        <h1>النظام متوقف مؤقتاً</h1>
        <p>نعتذر منك، إما أن النظام يخضع لتحديثات وصيانة في الوقت الحالي، أو ليس لديك الصلاحية للوصول لهذا الرابط. يرجى المحاولة بعد قليل أو التواصل مع الإدارة.</p>
        <a href="/smart_system/" class="btn">تحديث الصفحة</a>
    </div>
</body>
</html>
